services:
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: "https://geotrack.deloffre.fr/api"
    restart: unless-stopped

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: "postgresql+asyncpg://geotrack:geotrack_pass@db:5432/geotrack"
      REDIS_URL: "redis://redis:6379/0"
      CORS_ORIGINS: "https://geotrack.deloffre.fr"
      ENVIRONMENT: "${ENVIRONMENT:-production}"
      JWT_SECRET: "${JWT_SECRET:-change-me-in-dokploy-env}"
      JWT_ACCESS_EXPIRE_MINUTES: "60"
      JWT_REFRESH_EXPIRE_DAYS: "30"
      OPENAI_API_KEY: "${OPENROUTER_API_KEY:-}"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:-}"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.geotrack-api.entrypoints=websecure"
      - "traefik.http.routers.geotrack-api.rule=Host(`geotrack.deloffre.fr`) && PathPrefix(`/api`)"
      - "traefik.http.routers.geotrack-api.tls=true"
      - "traefik.http.routers.geotrack-api.tls.certResolver=letsencrypt"
      - "traefik.http.services.geotrack-api.loadbalancer.server.port=8000"

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-geotrack}
      POSTGRES_USER: ${POSTGRES_USER:-geotrack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-geotrack_pass}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-geotrack} -d ${POSTGRES_DB:-geotrack}"]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  worker:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: "postgresql+asyncpg://geotrack:geotrack_pass@db:5432/geotrack"
      REDIS_URL: "redis://redis:6379/0"
      CORS_ORIGINS: "https://geotrack.deloffre.fr"
      ENVIRONMENT: "${ENVIRONMENT:-production}"
      JWT_SECRET: "${JWT_SECRET:-change-me-in-dokploy-env}"
      OPENAI_API_KEY: "${OPENROUTER_API_KEY:-}"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:-}"
    command: ["python", "-m", "arq", "app.services.scan_queue.WorkerSettings"]
    labels:
      - "traefik.enable=false"

volumes:
  pgdata:
    name: geotrack_pgdata
    external: true

networks:
  default:
    name: dokploy-network
    external: true
