services:
  frontend:
    build: ./frontend
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.geotrack-front.entrypoints=websecure"
      - "traefik.http.routers.geotrack-front.rule=Host(`geotrack.deloffre.fr`)"
      - "traefik.http.routers.geotrack-front.tls=true"
      - "traefik.http.routers.geotrack-front.tls.certResolver=letsencrypt"
      - "traefik.http.services.geotrack-front.loadbalancer.server.port=80"

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.geotrack-api.entrypoints=websecure"
      - "traefik.http.routers.geotrack-api.rule=Host(`geotrack.deloffre.fr`) && PathPrefix(`/api`)"
      - "traefik.http.routers.geotrack-api.tls=true"
      - "traefik.http.routers.geotrack-api.tls.certResolver=letsencrypt"
      - "traefik.http.services.geotrack-api.loadbalancer.server.port=8000"

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-geotrack}
      POSTGRES_USER: ${POSTGRES_USER:-geotrack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-geotrack_pass}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-geotrack} -d ${POSTGRES_DB:-geotrack}"]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped

volumes:
  pgdata:
    name: geotrack_pgdata
    external: true

networks:
  default:
    name: dokploy-network
    external: true
